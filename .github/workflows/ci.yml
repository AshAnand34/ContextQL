name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore dependencies
        run: dotnet restore ContextQL.sln

      - name: Build solution
        run: dotnet build ContextQL.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ContextQL.sln --configuration Release --no-build --verbosity minimal
